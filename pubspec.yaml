name: ai_chat
description: AI Chat — Native Flutter App (Android & iOS)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking (SSE Streaming)
  http: ^1.6.0

  # Storage
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # UI & Markdown
  flutter_markdown: ^0.7.7+1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_fonts: ^6.3.3
  photo_view: ^0.15.0

  # Media & Input
  image_picker: ^1.2.1
  file_picker: ^8.3.7
  speech_to_text: ^7.3.0
  share_plus: ^10.1.4
  permission_handler: ^11.4.0

  # Utils
  uuid: ^4.5.3
  intl: ^0.19.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
